<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>
    <div class="game-container">
        <h1>BATTLE ARENA</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">Player</span>
                <span id="player-score" class="score-value">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Computer</span>
                <span id="computer-score" class="score-value">0</span>
            </div>
        </div>

        <div class="game-area">
            <div id="choices-container" class="choices">
                <button class="choice-btn" data-choice="rock" data-label="Rock">✊</button>
                <button class="choice-btn" data-choice="paper" data-label="Paper">✋</button>
                <button class="choice-btn" data-choice="scissors" data-label="Scissors">✌️</button>
            </div>
        </div>

        <div class="result-area">
            <div class="result-overlay">
                <div id="result-text">Pick your weapon!</div>
                <div id="choices-display" class="choices-display" style="display: none;">
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                        <span id="user-pick"></span>
                        <div style="font-size: 0.8rem; color: var(--text-muted)">YOU</div>
                    </div>
                    <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-light)">VS</div>
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                        <span id="computer-pick"></span>
                        <div style="font-size: 0.8rem; color: var(--text-muted)">CPU</div>
                    </div>
                </div>
            </div>
            <button id="play-again" class="play-again-btn">Play Another Round</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
